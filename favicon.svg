<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background matching --bg: #080d1a -->
  <rect width="32" height="32" rx="4" fill="#080d1a"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="8" x2="32" y2="8" stroke="rgba(0,200,255,0.08)" stroke-width="0.5"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="rgba(0,200,255,0.08)" stroke-width="0.5"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="rgba(0,200,255,0.08)" stroke-width="0.5"/>
  <line x1="8" y1="0" x2="8" y2="32" stroke="rgba(0,200,255,0.08)" stroke-width="0.5"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="rgba(0,200,255,0.08)" stroke-width="0.5"/>
  <line x1="24" y1="0" x2="24" y2="32" stroke="rgba(0,200,255,0.08)" stroke-width="0.5"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="32" height="2" rx="1" fill="url(#accent-grad)"/>

  <!-- > prompt character -->
  <polyline points="6,11 13,16 6,21" fill="none" stroke="#00c8ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- _ cursor -->
  <line x1="16" y1="22" x2="26" y2="22" stroke="#00c8ff" stroke-width="2.5" stroke-linecap="round"/>

  <defs>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="rgba(0,102,204,0.4)"/>
    </linearGradient>
  </defs>
</svg>
